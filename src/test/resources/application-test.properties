# H2 in-memory database for integration tests
spring.datasource.url=jdbc:h2:mem:auditdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

# Disable async for integration tests so writes happen synchronously
audit-trail.async=false
audit-trail.enabled=true
audit-trail.rest.enabled=true
