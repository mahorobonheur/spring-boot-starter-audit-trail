name: CodeQL Security Analysis

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  schedule:
    - cron: '30 2 * * 1'    # every Monday at 02:30 UTC

permissions:
  actions: read
  contents: read
  security-events: write    # upload SARIF results to GitHub Security tab

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        language: [ java ]

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: temurin
          cache: maven

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          # Use the default queries plus the security-extended suite
          queries: security-extended,security-and-quality

      # Build the project so CodeQL can trace compilation
      - name: Build for CodeQL
        run: mvn clean compile --batch-mode --no-transfer-progress -DskipTests

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:${{ matrix.language }}"
          upload: true
