name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'          # e.g. v1.0.0
      - 'v[0-9]+.[0-9]+.[0-9]+-*'        # e.g. v1.1.0-RC1

permissions:
  contents: write    # create GitHub Release
  packages: write    # publish to GitHub Packages

jobs:
  # ── 1. Full verification before publishing ────────────────────────────────
  verify:
    name: Verify before release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout tag
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: temurin
          cache: maven

      - name: Full test suite
        run: mvn clean verify --batch-mode --no-transfer-progress -e

  # ── 2. Publish to Maven Central ───────────────────────────────────────────
  publish-central:
    name: Publish to Maven Central
    needs: verify
    runs-on: ubuntu-latest

    steps:
      - name: Checkout tag
        uses: actions/checkout@v4

      - name: Set up JDK 17 (with Maven Central server config)
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: temurin
          cache: maven
          server-id: central                          # matches <id>central</id> in pom.xml
          server-username: MAVEN_CENTRAL_USERNAME     # resolved from env below
          server-password: MAVEN_CENTRAL_TOKEN        # resolved from env below
          gpg-private-key: ${{ secrets.GPG_PRIVATE_KEY }}
          gpg-passphrase: MAVEN_GPG_PASSPHRASE        # resolved from env below

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Set POM version to tag version
        run: |
          mvn versions:set -DnewVersion=${{ steps.version.outputs.VERSION }} \
            --batch-mode --no-transfer-progress

      - name: Deploy to Maven Central (release profile)
        run: |
          mvn clean deploy -P release \
            --batch-mode --no-transfer-progress -e \
            -DskipTests
        env:
          MAVEN_CENTRAL_USERNAME: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          MAVEN_CENTRAL_TOKEN:    ${{ secrets.MAVEN_CENTRAL_TOKEN }}
          MAVEN_GPG_PASSPHRASE:   ${{ secrets.GPG_PASSPHRASE }}

  # ── 3. Publish to GitHub Packages (backup registry) ──────────────────────
  publish-github-packages:
    name: Publish to GitHub Packages
    needs: verify
    runs-on: ubuntu-latest

    steps:
      - name: Checkout tag
        uses: actions/checkout@v4

      - name: Set up JDK 17 (with GitHub Packages server)
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: temurin
          cache: maven
          server-id: github
          server-username: GITHUB_ACTOR
          server-password: GITHUB_TOKEN

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Set POM version
        run: |
          mvn versions:set -DnewVersion=${{ steps.version.outputs.VERSION }} \
            --batch-mode --no-transfer-progress

      - name: Publish to GitHub Packages
        run: |
          mvn clean deploy \
            --batch-mode --no-transfer-progress -e \
            -DskipTests \
            -DaltDeploymentRepository=github::https://maven.pkg.github.com/${{ github.repository }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_ACTOR: ${{ github.actor }}

  # ── 4. Create GitHub Release with changelog ───────────────────────────────
  github-release:
    name: Create GitHub Release
    needs: [ publish-central, publish-github-packages ]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout tag (for CHANGELOG)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Extract release notes from CHANGELOG.md
        id: changelog
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          # Pull the section for this version out of CHANGELOG.md
          NOTES=$(awk "/^## \[${VERSION}\]/{flag=1; next} /^## \[/{flag=0} flag" CHANGELOG.md)
          if [ -z "$NOTES" ]; then
            NOTES="See [CHANGELOG.md](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md) for details."
          fi
          # Write to a file to avoid quoting issues
          echo "$NOTES" > release_notes.md
          echo "notes_file=release_notes.md" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          name: "v${{ steps.version.outputs.VERSION }}"
          body_path: ${{ steps.changelog.outputs.notes_file }}
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}  # RC / alpha tags → pre-release
          generate_release_notes: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
