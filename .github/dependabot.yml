version: 2

updates:
  # ── Maven dependencies ─────────────────────────────────────────────────────
  - package-ecosystem: maven
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Africa/Kigali
    open-pull-requests-limit: 10
    labels:
      - dependencies
      - java
    commit-message:
      prefix: "chore(deps)"
    # Spring Boot minor/major version bumps require manual migration testing.
    # Dependabot should only propose patch-level updates for the parent POM.
    ignore:
      - dependency-name: "org.springframework.boot:spring-boot-starter-parent"
        update-types:
          - "version-update:semver-minor"
          - "version-update:semver-major"
    groups:
      spring-boot:
        patterns:
          - "org.springframework.boot:*"
          - "org.springframework:*"
          - "org.springframework.security:*"
          - "org.springframework.data:*"
      jackson:
        patterns:
          - "com.fasterxml.jackson*:*"
      testing:
        patterns:
          - "org.junit*:*"
          - "org.assertj:*"
          - "org.mockito:*"
          - "org.awaitility:*"
          - "com.h2database:*"
      build-plugins:
        patterns:
          - "org.apache.maven.plugins:*"
          - "org.jacoco:*"
          - "org.sonatype.central:*"

  # ── GitHub Actions ──────────────────────────────────────────────────────────
  - package-ecosystem: github-actions
    directory: /
    target-branch: "develop"
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Africa/Kigali
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - github-actions
    commit-message:
      prefix: "chore(ci)"
